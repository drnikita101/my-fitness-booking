<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Фитнес-бронирование MVP</title>
    <!-- Подключаем CSS библиотеки -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем JavaScript библиотеки -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Навигация -->
        <nav>
            <div class="nav-buttons">
                <button id="nav-home">Главная</button>
                <button id="nav-profile" style="display:none;">Профиль</button>
                <button id="nav-logout" style="display:none;">Выйти</button>
                <button id="nav-login">Войти</button>
            </div>
        </nav>

        <!-- Контейнер для динамического контента -->
        <div id="content"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
